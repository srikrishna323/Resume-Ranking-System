<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>📊 Ranking Results</h1>

    <table>
        <tr>
            <th>Candidate</th>
            <th>Score (%)</th>
        </tr>

        {% for r in results %}
        <tr>
            <td>{{ r.name }}</td>
            <td>{{ r.score }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
